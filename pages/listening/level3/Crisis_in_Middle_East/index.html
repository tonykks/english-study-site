<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Story Study</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-b from-stone-100 to-gray-50 text-gray-900">
  <div class="mx-auto max-w-6xl px-4 py-6 md:px-6 md:py-10">
    <section class="mb-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-lg md:p-6">
      <div class="mb-3 flex flex-wrap items-end justify-between gap-3">
        <div>
          <p class="text-xs font-semibold uppercase tracking-widest text-indigo-600">Video Lesson</p>
          <p id="video-label" class="text-sm text-gray-500">YouTube lesson loading...</p>
        </div>
        <p id="video-channel" class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">Channel: -</p>
      </div>
      <div id="video-frame-wrap" class="video-shell rounded-xl">
        <div class="video-placeholder text-sm font-semibold text-stone-600">영상 정보를 불러오는 중입니다.</div>
      </div>
    </section>

    <header class="mb-4 rounded-2xl border border-stone-200 bg-white p-5 shadow-md md:p-7">
      <p class="text-xs font-semibold uppercase tracking-widest text-indigo-600">Shadowing Study Page</p>
      <h1 id="hero-title" class="mt-2 text-2xl font-bold leading-tight md:text-4xl">영어 학습 페이지</h1>
      <p id="hero-desc" class="mt-3 max-w-3xl text-sm leading-relaxed text-gray-600 md:text-base">데이터를 로딩 중입니다...</p>
      <div class="mt-4 flex flex-wrap gap-2 text-xs md:text-sm">
        <p id="hero-level" class="rounded-full bg-stone-100 px-3 py-1 font-medium text-stone-700">Level: -</p>
        <p id="hero-source" class="rounded-full bg-stone-100 px-3 py-1 font-medium text-stone-700"></p>
      </div>
      <div id="hero-meta" class="mt-3 flex flex-wrap gap-2"></div>
    </header>

    <nav class="sticky top-2 z-20 mb-4 rounded-2xl border border-stone-200 bg-white/95 p-2 shadow-sm backdrop-blur" aria-label="학습 탭" role="tablist">
      <div class="grid grid-cols-2 gap-2 md:grid-cols-5">
        <button class="tab-btn active" data-tab="intro" role="tab" aria-selected="true" aria-controls="tab-intro" id="tab-btn-intro">📌 Intro</button>
        <button class="tab-btn" data-tab="core" role="tab" aria-selected="false" aria-controls="tab-core" id="tab-btn-core">💡 Core</button>
        <button class="tab-btn" data-tab="summary" role="tab" aria-selected="false" aria-controls="tab-summary" id="tab-btn-summary">📝 Summary</button>
        <button class="tab-btn" data-tab="script" role="tab" aria-selected="false" aria-controls="tab-script" id="tab-btn-script">📖 Full Script</button>
        <button class="tab-btn" data-tab="wordcards" role="tab" aria-selected="false" aria-controls="tab-wordcards" id="tab-btn-wordcards">🧠 Word Cards</button>
      </div>
    </nav>

    <main>
      <section id="tab-intro" class="tab-panel active rounded-2xl border border-stone-200 bg-white p-4 shadow-md md:p-6" role="tabpanel" aria-labelledby="tab-btn-intro">
        <h2 class="mb-4 text-xl font-bold text-gray-900">Intro</h2>
        <div id="intro-content" class="space-y-3"></div>
      </section>

      <section id="tab-core" class="tab-panel rounded-2xl border border-stone-200 bg-white p-4 shadow-md md:p-6" role="tabpanel" aria-labelledby="tab-btn-core">
        <h2 class="mb-4 text-xl font-bold text-gray-900">Core Sentences</h2>
        <div id="core-content" class="space-y-3"></div>
      </section>

      <section id="tab-summary" class="tab-panel rounded-2xl border border-stone-200 bg-white p-4 shadow-md md:p-6" role="tabpanel" aria-labelledby="tab-btn-summary">
        <h2 class="mb-4 text-xl font-bold text-gray-900">Summary</h2>
        <div id="summary-content" class="space-y-3"></div>
      </section>

      <section id="tab-script" class="tab-panel rounded-2xl border border-stone-200 bg-white p-4 shadow-md md:p-6" role="tabpanel" aria-labelledby="tab-btn-script">
        <h2 class="mb-4 text-xl font-bold text-gray-900">Full Script</h2>
        <div id="script-content" class="space-y-3"></div>
      </section>

      <section id="tab-wordcards" class="tab-panel rounded-2xl border border-stone-200 bg-white p-4 shadow-md md:p-6" role="tabpanel" aria-labelledby="tab-btn-wordcards">
        <h2 class="mb-4 text-xl font-bold text-gray-900">Word Cards</h2>
        <div id="wordcard-content" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
